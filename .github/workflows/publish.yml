name: Publish

# Publishes hypatorch to PyPI whenever a GitHub Release is published.
#
# Auth uses PyPI Trusted Publishing (OIDC) -- there are NO API tokens or secrets
# to manage. Any maintainer who can publish a GitHub Release triggers a publish.
#
# One-time setup required for this to work (see RELEASING.md):
#   1. PyPI -> project "hypatorch" -> Publishing -> add a GitHub publisher with:
#        owner = Altavo, repo = hypatorch,
#        workflow = publish.yml, environment = pypi
#   2. GitHub -> repo Settings -> Environments -> create an environment named "pypi".
#      (Leave "required reviewers" off so every maintainer's release publishes
#      automatically; add reviewers only if you want a manual approval gate.)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Gate the release on the full test matrix (reuses tests.yml).
  tests:
    uses: ./.github/workflows/tests.yml

  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so setuptools-scm sees the release tag

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify built version matches the release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          built="$(ls dist/*.tar.gz | sed -E 's#.*/hypatorch-(.+)\.tar\.gz#\1#')"
          echo "release tag : $tag"
          echo "built version: $built"
          if [ "$tag" != "$built" ]; then
            echo "::error::Release tag ($tag) != built version ($built). Create the release on a clean tagged commit -- a 'dev'/'+' version means the tag is not on HEAD or the tree was dirty."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # mint the OIDC token PyPI Trusted Publishing requires
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
